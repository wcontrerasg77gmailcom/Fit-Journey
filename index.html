<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#101820">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fit Journey">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
  <title>Fit Journey</title>
</head>
<body>
  <header class="topbar">
    <div>
      <small>PROGRAMA PERSONAL</small>
      <h1>Fit Journey</h1>
    </div>
    <button id="installBtn" class="ghost hidden">Instalar</button>
  </header>

  <main id="app">
    <section id="home" class="view active"></section>
    <section id="workout" class="view"></section>
    <section id="library" class="view"></section>
    <section id="nutrition" class="view"></section>
    <section id="progress" class="view"></section>
    <section id="settings" class="view"></section>
  </main>

  <nav class="bottom-nav">
    <button data-view="home">Hoy</button>
    <button data-view="workout">Rutina</button>
    <button data-view="library">Ejercicios</button>
    <button data-view="nutrition">Nutrición</button>
    <button data-view="progress">Progreso</button>
  </nav>

  <dialog id="exerciseDialog">
    <button class="close" onclick="exerciseDialog.close()">×</button>
    <div id="exerciseDetail"></div>
  </dialog>

  <dialog id="timerDialog">
    <button class="close" onclick="timerDialog.close()">×</button>
    <div class="timer-wrap">
      <small>DESCANSO</small>
      <div id="timerValue">90</div>
      <div class="timer-actions">
        <button onclick="changeTimer(-15)">−15 s</button>
        <button id="timerToggle" onclick="toggleTimer()">Iniciar</button>
        <button onclick="changeTimer(15)">+15 s</button>
      </div>
    </div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
